name: Build wheels

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "src/bigvgan/alias_free_activation/cuda/**/*.cu"
      - "src/bigvgan/alias_free_activation/cuda/**/*.cpp"
      - "src/bigvgan/alias_free_activation/cuda/**/*.h"
      - ".github/workflows/build_wheels.yml"
      - "pyproject.toml"

  pull_request:
    branches:
      - main
    paths:
      - "src/bigvgan/alias_free_activation/cuda/**/*.cu"
      - "src/bigvgan/alias_free_activation/cuda/**/*.cpp"
      - "src/bigvgan/alias_free_activation/cuda/**/*.h"
      - ".github/workflows/build_wheels.yml"
      - "pyproject.toml"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_wheels:
    name: Build wheel on Python ${{ matrix.python-version }} / CUDA ${{ matrix.cuda-version }}
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.11"
            cuda-version: "13.0.2"
            torch-cuda-index: "cu130"

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          prune-cache: true
          cache-dependency-glob: |
            pyproject.toml
            .github/workflows/build_wheels.yml
          cache-suffix: py${{ matrix.python-version }}-cu${{ matrix.cuda-version }}-${{ matrix.torch-cuda-index }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Check tag matches pyproject version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail

          TAG_VERSION="${GITHUB_REF_NAME#v}"

          PYPROJECT_VERSION="$(python - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)

          print(data["project"]["version"])
          PY
          )"

          echo "Tag version: ${TAG_VERSION}"
          echo "pyproject.toml version: ${PYPROJECT_VERSION}"

          if [ "${TAG_VERSION}" != "${PYPROJECT_VERSION}" ]; then
            echo "Tag version does not match pyproject.toml version"
            exit 1
          fi

      - name: Install CUDA Toolkit ${{ matrix.cuda-version }}
        uses: Jimver/cuda-toolkit@v0.2.35
        id: cuda-toolkit
        with:
          cuda: ${{ matrix.cuda-version }}
          method: network
          sub-packages: '["nvcc", "cudart-dev", "cccl", "libraries-dev"]'
          log-file-suffix: py${{ matrix.python-version }}-cu${{ matrix.cuda-version }}.txt

      - name: Install build frontend
        run: |
          uv pip install --system "build>=1.5"

      - name: Build wheel
        env:
          CUDA_HOME: ${{ steps.cuda-toolkit.outputs.CUDA_PATH }}
          CUDA_PATH: ${{ steps.cuda-toolkit.outputs.CUDA_PATH }}
          BUILD_CUDA_EXT: "1"
          TORCH_CUDA_ARCH_LIST: "7.5"

          PIP_INDEX_URL: "https://pypi.org/simple"
          PIP_EXTRA_INDEX_URL: "https://download.pytorch.org/whl/${{ matrix.torch-cuda-index }}"
        run: |
          set -euo pipefail

          nvcc -V
          python -m build --wheel

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: bigvgan-wheels-py${{ matrix.python-version }}-cu${{ matrix.cuda-version }}-sm75
          path: dist/*.whl
          if-no-files-found: error

  release:
    name: Create GitHub release
    runs-on: ubuntu-22.04
    needs:
      - build_wheels

    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: bigvgan-wheels-*
          path: release-dist
          merge-multiple: true

      - name: List release files
        run: |
          set -euo pipefail

          find release-dist -type f -maxdepth 2 -print

      - name: Create release and upload wheels
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          shopt -s nullglob
          wheels=(release-dist/*.whl)

          if [ "${#wheels[@]}" -eq 0 ]; then
            echo "No wheels found"
            exit 1
          fi

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists"
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi

          gh release upload "${GITHUB_REF_NAME}" "${wheels[@]}" --clobber
